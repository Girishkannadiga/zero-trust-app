# ── Server ───────────────────────────────────────────────────
server.port=8081
spring.profiles.active=dev

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────
# Secret must be Base64-encoded and at least 256 bits (32 bytes decoded)
jwt.secret=dGhpcyBpcyBhIHNlY3VyZSBzZWNyZXQga2V5IGZvciBqd3QgdGVzdGluZzEyMzQ1
jwt.expiration=86400000

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── Swagger ───────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ── CORS ──────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000
