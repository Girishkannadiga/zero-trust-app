# ── Datasource (dev) ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://[::1]:3306/zero_trust_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
