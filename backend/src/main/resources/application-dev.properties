# ── Mail (Gmail SMTP) ─────────────────────────────────────────
# To receive OTP by email:
#   1. Enable 2-Step Verification at myaccount.google.com/security
#   2. Generate App Password at myaccount.google.com/apppasswords
#   3. Replace YOUR_GMAIL_APP_PASSWORD below (16-char code, no spaces)
# NOTE: OTP is ALWAYS printed to the backend console — works without email.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=arssoftech@gmail.com
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ── Logging (dev) ────────────────────────────────────────────
logging.level.com.zerotrust=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
